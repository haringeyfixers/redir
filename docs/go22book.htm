<!DOCTYPE HTML>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Haringey Fixers - Confirm Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="go22book.css">

</head>
<body>

<div class="confirm-box">
    <img src="favicon.svg" alt="Haringey Fixers Logo" class="logo">
    
    <div class="label">Confirming activity time for:</div>
    <div id="nameDisplay">Loading...</div>
    <div id="activityTimeDisplay">Loading...</div>
    
    <button id="sendBtn">Send Confirmation</button>
    
    <div id="checkIcon" class="success-checkmark">✅</div>
    <div id="statusMsg" style="margin-top:20px; font-size: 14px; color: #3c4043;"></div>
</div>

<script type="module" src="js/go22bookMain.js"></script>
</body>
</html>
